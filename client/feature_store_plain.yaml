# ── CLIENT feature_store.yaml  (Plain / Insecure) ────────────
# Use when: Docker is on same VPC/VPN as DS,
#           no TLS needed, or during PoC/dev.
#
# Replace FEAST_SERVER_HOST with your server's DNS or IP.
# Examples:
#   feast.bfi-dev.internal
#   10.0.1.25
#
# HOW TO USE:
#   export FEAST_SERVER_HOST=feast.bfi-dev.internal
#   envsubst < feature_store_plain.yaml > feature_store.yaml
#   python test_client.py

project: bfi_credit_features
entity_key_serialization_version: 2

# ── Registry (gRPC) ─────────────────────────────────────────
# CRITICAL: include http:// scheme prefix for non-localhost
# Without scheme prefix → gRPC defaults to TLS and fails on plain server
registry:
  registry_type: remote
  path: ${FEAST_SERVER_HOST}:6570

# ── Offline store (Arrow Flight) ─────────────────────────────
# CRITICAL: scheme: grpc is REQUIRED for non-localhost connections
# Without it → pyarrow Flight defaults to TLS and gets SSL error
offline_store:
  type: remote
  host: ${FEAST_SERVER_HOST}
  port: 8815
  scheme: grpc                  # ← THIS is what fixes the DNS/remote issue

# ── Online store (REST HTTP) ─────────────────────────────────
# Must be explicit http:// or https://
online_store:
  type: remote
  path: http://${FEAST_SERVER_HOST}:6566
