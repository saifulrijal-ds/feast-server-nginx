# ═══════════════════════════════════════════════════════════════
#  nginx reverse proxy for Feast 0.62.0
#
#  Port 80  → redirect to 443
#  Port 443 → TLS termination, routes by path:
#    /feast.registry.*                    → grpc://feast-registry:6570
#    /feast.serving.*                     → grpc://feast-online:6566
#    /arrow.flight.protocol.*             → grpc://feast-offline:8815
#    /get-online-features|/push|/health   → http://feast-online:6566 (REST)
#    /                                    → http://feast-ui:8888
#
#  Feast services run plain (FEAST_TLS=false) inside Docker.
#  server_name is substituted at container startup via envsubst.
# ═══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {

    log_format main '$remote_addr - $request_time s '
                    '"$request" $status $body_bytes_sent '
                    '"$http_grpc_status"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # Docker's internal DNS — re-resolves upstream hostnames every 30s
    # so nginx picks up new container IPs after restarts without needing
    # its own restart.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Upstream definitions ──────────────────────────────────
    upstream feast_registry {
        server feast-registry:6570;
    }
    upstream feast_offline {
        server feast-offline:8815;
    }
    upstream feast_online {
        server feast-online:6566;
    }
    upstream feast_ui {
        server feast-ui:8888;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + gRPC reverse proxy ────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # gRPC: Registry
        location /feast.registry {
            grpc_pass grpc://feast_registry;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
        }

        # gRPC: Online serving
        location /feast.serving {
            grpc_pass grpc://feast_online;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_read_timeout 60s;
            grpc_send_timeout 60s;
        }

        # gRPC: Offline (Arrow Flight) — streams large dataset chunks
        location /arrow.flight.protocol {
            grpc_pass grpc://feast_offline;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            client_max_body_size 0;
            grpc_read_timeout  600s;
            grpc_send_timeout  600s;
        }

        # REST: Online feature server API endpoints
        location ~ ^/(get-online-features|push|health|list-feature-views) {
            proxy_pass http://feast_online;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Feast Web UI (plain HTTP) ─────────────────────────
        location / {
            proxy_pass http://feast_ui;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
        }
    }
}
