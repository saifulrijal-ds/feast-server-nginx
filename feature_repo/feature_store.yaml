# ── SERVER-SIDE feature_store.yaml ───────────────────────────
# Used INSIDE Docker containers (direct DB access on Docker network)
# NOT the file the DS uses locally.

project: credit_risk_modeling
provider: local
entity_key_serialization_version: 3

registry:
  registry_type: sql
  path: postgresql+psycopg2://feast:feast123@postgres:5432/feast
  cache_ttl_seconds: 60

offline_store:
  type: file

online_store:
  type: redis
  connection_string: "redis:6379"

# ── Auth: OIDC via Keycloak (server-side token validation) ───
# Feast servers validate incoming JWT tokens using Keycloak's JWKS.
# Uses internal Docker hostname — no TLS needed inside the network.
auth:
  type: oidc
  client_id: feast-app
  auth_discovery_url: http://keycloak:8080/realms/feast-realm/.well-known/openid-configuration
